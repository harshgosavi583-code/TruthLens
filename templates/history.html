<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens | Prediction History</title>
    <link rel="stylesheet" href="../static/css/history.css">
</head>
<body>

<div class="overlay">

    <div class="history-box">

        <h1>📜 Prediction History</h1>

        <table>

            <tr>
                <th>Date</th>
                <th>News URL</th>
                <th>Prediction</th>
                <th>Confidence</th>
            </tr>

            {% if history %}

                {% for item in history %}

                <tr>
                    <td>{{ item.date }}</td>

                    <td>
                        {% if item.url %}
                            {{ item.url[:45] }}...
                        {% else %}
                            No URL
                        {% endif %}
                    </td>

                    <td>{{ item.prediction }}</td>

                    <td>{{ item.confidence }}</td>
                </tr>

                {% endfor %}

            {% else %}

                <tr>
                    <td colspan="4">No prediction history found.</td>
                </tr>

            {% endif %}

        </table>

        <br>

        <a href="/dashboard">
            <button>← Back to Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>
