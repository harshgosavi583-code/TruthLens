<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login History</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_history.css') }}">
</head>
<body>

<div class="container">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h1>Login History</h1>

    <a href="/dashboard"
       style="
       text-decoration:none;
       background:#0d6efd;
       color:white;
       padding:10px 18px;
       border-radius:8px;
       font-weight:bold;">
       ← Back to Dashboard
    </a>
</div>

    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Login Time</th>
        </tr>

        {% for user in logins %}
        <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.login_time }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
