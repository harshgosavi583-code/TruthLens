<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TruthLens | Prediction Result</title>

    <link rel="stylesheet" href="../static/css/result.css">

</head>

<body>

<div class="overlay">

    <div class="result-box">

        <h1>🤖 AI Prediction Result</h1>

        <h2>Prediction</h2>

        <div class="prediction">

            <h2>{{ prediction }}</h2>

        </div>

        <h3>News Submitted</h3>

        <div class="news-box">

            <p>{{ news }}</p>

        </div>

        <div class="buttons">

            <a href="/detect">
                <button>Analyze Another News</button>
            </a>

            <a href="/dashboard">
                <button class="dashboard-btn">Dashboard</button>
            </a>

        </div>

    </div>

</div>

</body>

</html>
